[profile.default]
src = 'src'
out = 'out'
libs = ['lib', '../packages/harness']
test = 'test'
script = 'script'
solc_version = '0.8.25'
evm_version = 'shanghai'
bytecode_hash = "none"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 110
tab_width = 4
quote_style = 'double'
