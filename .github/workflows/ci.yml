name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install forge dependencies
        working-directory: contracts
        run: |
          # `forge install --no-git` strips .git, which breaks recursive submodule
          # init inside icm-contracts (it depends on subnet-evm as a git submodule).
          # Clone deps directly with --recurse-submodules instead.
          mkdir -p lib
          git clone --depth 1 --branch v1.9.4 --recurse-submodules \
            https://github.com/foundry-rs/forge-std.git lib/forge-std
          git clone --depth 1 --branch v5.0.2 --recurse-submodules \
            https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable.git lib/openzeppelin-contracts-upgradeable
          git clone --depth 1 --branch v1.0.9 --recurse-submodules \
            https://github.com/ava-labs/icm-contracts.git lib/icm-contracts

      - name: Check formatting
        run: forge fmt --check --root contracts

      - name: Run tests
        run: forge test --root contracts -vv

  typecheck-ts:
    name: TypeScript build & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/**' build

      - name: Typecheck examples
        run: pnpm --filter @interchain-kit/examples typecheck
