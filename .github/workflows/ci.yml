name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge dependencies
        working-directory: contracts
        run: |
          forge install --no-git foundry-rs/forge-std@v1.9.4
          forge install --no-git OpenZeppelin/openzeppelin-contracts-upgradeable@v5.0.2
          forge install --no-git ava-labs/icm-contracts@v1.0.9
          # icm-contracts pulls subnet-evm + its own forge-std/oz-upgradeable via git submodules.
          # `forge install --no-git` does not recurse, so fetch icm-contracts' submodules explicitly.
          git -C lib/icm-contracts submodule update --init --recursive

      - name: Check formatting
        run: forge fmt --check --root contracts

      - name: Run tests
        run: forge test --root contracts -vv

  typecheck-ts:
    name: TypeScript build & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/**' build

      - name: Typecheck examples
        run: pnpm --filter @interchain-kit/examples typecheck
